apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-giropopssenhas
  labels:
    app: {{ .Release.Name }}-giropopssenhas
spec:
  replicas: {{ .Values.replicas.min }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-giropopssenhas
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-giropopssenhas
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 5000
          name: giropops-senhas
        env:
        - name: REDIS_HOST
          value: redis-service
        resources:
          requests:
            cpu: "{{ .Values.resources.requests.cpu }}"
            memory: "{{ .Values.resources.requests.memory }}"
          limits:
            cpu: "{{ .Values.resources.limits.cpu }}"
            memory: "{{ .Values.resources.limits.memory }}"
